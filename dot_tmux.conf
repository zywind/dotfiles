# ~/.tmux.conf
# Prefix stays at the default Ctrl-b.

# Enable mouse: scroll, click to select panes, drag borders to resize
set -g mouse on

# Start window and pane numbering at 1 (0 is awkward to reach)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Open new panes in the current pane's directory (default uses the dir tmux was
# started in). Same split keys as the defaults, just with -c.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Keep the session's working dir on the focused pane. iTerm2's tmux integration
# (-CC, Cmd+D) issues its own split-window that bypasses the bindings above and
# falls back to the session dir, so syncing it makes those splits open in cwd.
set-hook -g pane-focus-in 'attach-session -c "#{pane_current_path}"'

# Bigger scrollback buffer
set -g history-limit 10000

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- Nicer behavior with Claude Code + iTerm2 ---

# Make ESC instant (matters for Claude Code interrupt + vim); default is 500ms
set -sg escape-time 10

# Truecolor under iTerm2 (feature is keyed on iTerm2's outer TERM)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Let apps inside tmux detect focus changes
set -g focus-events on

# Push copy-mode selections to the macOS clipboard via iTerm2 (OSC 52)
set -g set-clipboard on

# === Plugins (TPM) ===
# Install/update from inside tmux: prefix + I (install), prefix + U (update).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore: prefix Ctrl-s / Ctrl-r
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save + auto-restore

set -g @continuum-restore 'on'                 # restore last session automatically on start
set -g @resurrect-capture-pane-contents 'on'   # also restore on-screen pane contents

# Keep this as the LAST line of the file
run '~/.tmux/plugins/tpm/tpm'
